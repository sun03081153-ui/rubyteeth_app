<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乖寶寶點數</title> <link rel="manifest" href="/manifest.json">
    
    <link rel="apple-touch-icon" href="/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <meta name="apple-mobile-web-app-title" content="乖寶寶點數">

    <style>
        /* body 控制整個畫面的最底層背景 */
        body { 
            font-family: sans-serif; /* 設定字體 */
            text-align: center;      /* 讓所有文字跟按鈕都置中對齊 */
            background-color: #fff0f5; /* 設定背景顏色為溫馨的淺粉紅 */
            padding-top: 50px;       /* 讓內容往下移一點，不要黏在螢幕最頂端 */
        }
        
        /* .points-box 控制「目前累積點數」這行字的樣式 */
        .points-box { 
            font-size: 24px; 
            margin-bottom: 30px; /* 和下方的按鈕保持 30px 的距離 */
        }
        
        /* .points-number 控制中間那個大數字的樣式 */
        .points-number { 
            font-size: 48px;     /* 字體放大 */
            color: #ff69b4;      /* 字體顏色設為深粉紅 */
            font-weight: bold;   /* 字體加粗 */
        }
        
        /* button 控制打卡按鈕的長相 */
        button { 
            background-color: #ffb6c1; /* 按鈕背景色 */
            border: none;              /* 拿掉醜醜的黑色邊框 */
            padding: 20px 40px;        /* 按鈕內部的空間 (上下20, 左右40) */
            font-size: 24px; 
            border-radius: 50px;       /* 讓按鈕的邊緣變成圓角 (數值越大越圓) */
            color: white;              /* 按鈕上的文字顏色 */
            cursor: pointer;           /* 滑鼠游標移過去時變成手指圖案 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 幫按鈕加一點點立體陰影 */
        }
        
        /* button:active 控制「按下去那一瞬間」的動畫效果 */
        button:active { 
            transform: scale(0.95); /* 按下去時縮小到 95%，製造按壓的真實感 */
        }
    </style>
</head>
<body>

    <div class="points-box">
        目前累積點數<br>
        <div class="points-number" id="pointDisplay">0</div>
    </div>

    <button onclick="brushTeeth()">我刷好牙了！🪥</button>


    <script>
        // 【設定你的雲端廚房地址】
        // 這裡已經換成你專屬的 Render 伺服器網址了！
        const API_URL = "https://rubyteeth1-app.onrender.com";

        // 【任務一：一打開 App 要做的事】
        // window.onload 代表網頁載入完成的瞬間
        window.onload = async function() {
            // 1. 派出 fetch 服務生，去後端的 /points 窗口問現在有幾點
            let response = await fetch(API_URL + "/points");
            // 2. 把後端給的資料解讀出來
            let data = await response.json();
            // 3. 拿出 pointDisplay 的身分證，把畫面上的文字 (innerText) 替換成最新的點數
            document.getElementById("pointDisplay").innerText = data.points;
        }

        // 【任務二：按下打卡按鈕要做的事】
        async function brushTeeth() {
            // 1. 派出 fetch 服務生，去後端的 /brush 窗口，並指定用 "POST" (提交資料) 的方式打卡
            let response = await fetch(API_URL + "/brush", { method: "POST" });
            let data = await response.json();
            
            // 2. 拿到打卡後的最新點數，再次更新畫面
            document.getElementById("pointDisplay").innerText = data.points;
            
            // 3. 跳出一個系統小視窗，顯示後端傳來的 "打卡成功！" 訊息
            alert(data.message); 
        }
    </script>
</body>
</html>
