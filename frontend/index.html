<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷牙獎勵小幫手</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fff0f5; padding-top: 50px; }
        .points-box { font-size: 24px; margin-bottom: 30px; }
        .points-number { font-size: 48px; color: #ff69b4; font-weight: bold; }
        button { background-color: #ffb6c1; border: none; padding: 20px 40px; font-size: 24px; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="points-box">
        目前累積點數<br>
        <div class="points-number" id="pointDisplay">0</div>
    </div>

    <button onclick="brushTeeth()">我刷好牙了！🪥</button>

    <script>
        // 設定你的 Python 伺服器網址 (本地測試預設是 8000 port)
        const API_URL = "https://rubyteeth1-app.onrender.com";

        // 網頁載入時，先去後端抓目前點數
        window.onload = async function() {
            let response = await fetch(API_URL + "/points");
            let data = await response.json();
            document.getElementById("pointDisplay").innerText = data.points;
        }

        // 按下按鈕時，告訴後端打卡了
        async function brushTeeth() {
            let response = await fetch(API_URL + "/brush", { method: "POST" });
            let data = await response.json();
            document.getElementById("pointDisplay").innerText = data.points;
            alert(data.message); // 跳出成功小提示
        }
    </script>
</body>
</html>
